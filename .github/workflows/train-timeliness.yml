name: TFL Train Timeliness Monitor

on:
  # Run every 5 minutes during operating hours (Mon-Fri, 8am-midnight UK time)
  schedule:
    - cron: '*/5 8-23 * * 1-5'  # Every 5 minutes, 8am-11:55pm UTC, weekdays
  # Allow manual trigger for testing
  workflow_dispatch:

# Allow the workflow to write to the repository and deploy GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect-timeliness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run timeliness collection
        run: python train_timeliness.py
        env:
          DATA_DIR: timeliness_data
          OUTPUT_HTML: timeliness_report.html

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add timeliness_data/ timeliness_report.html
          git diff --cached --quiet || git commit -m "📊 Timeliness snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Prepare Pages content
        run: |
          mkdir -p _site
          cp timeliness_report.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    needs: collect-timeliness
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
